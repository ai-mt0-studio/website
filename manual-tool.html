<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI業務マニュアル作成 Pro Lite</title>
<style>
  :root {
    --bg: #06061a;
    --purple-700: #7c3aed;
    --purple-400: #a78bfa;
    --blue-700: #1d4ed8;
    --blue-400: #60a5fa;
    --blue-300: #93c5fd;
    --green-400: #34d399;
    --red-400: #f87171;
    --yellow-400: #fbbf24;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --glass: rgba(255,255,255,0.04);
    --glass-border: rgba(255,255,255,0.09);
    --input-bg: rgba(0,0,0,0.35);
  }
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background-color: var(--bg);
    background-image:
      radial-gradient(ellipse 60% 50% at 15% 40%, rgba(124,58,237,0.15) 0%, transparent 70%),
      radial-gradient(ellipse 50% 40% at 85% 15%, rgba(29,78,216,0.15) 0%, transparent 70%),
      radial-gradient(ellipse 40% 35% at 50% 90%, rgba(59,7,100,0.18) 0%, transparent 70%);
    min-height: 100vh; color: var(--text);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    padding: 2rem 1rem 5rem;
  }
  .orb { position: fixed; border-radius: 50%; filter: blur(90px); opacity: 0.1; pointer-events: none; z-index: 0; }
  .orb-1 { width: 500px; height: 500px; background: var(--purple-700); top: -150px; right: -150px; }
  .orb-2 { width: 380px; height: 380px; background: var(--blue-700); bottom: 50px; left: -120px; }

  .container { max-width: 960px; margin: 0 auto; position: relative; z-index: 1; }

  header { text-align: center; margin-bottom: 2rem; }
  header h1 {
    font-size: clamp(1.8rem, 4vw, 2.6rem); font-weight: 800; letter-spacing: -0.02em;
    background: linear-gradient(130deg, var(--blue-300) 0%, var(--purple-400) 60%, var(--blue-400) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    margin-bottom: 0.4rem;
  }
  header p { color: var(--muted); font-size: 0.9rem; }
  .free-badge {
    display: inline-block; background: rgba(52,211,153,0.15); border: 1px solid rgba(52,211,153,0.4);
    color: var(--green-400); font-size: 0.75rem; font-weight: 700;
    padding: 0.2rem 0.85rem; border-radius: 999px; margin-top: 0.5rem;
  }

  .card {
    background: var(--glass); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
    border: 1px solid var(--glass-border); border-radius: 18px; padding: 1.5rem; margin-bottom: 1.25rem;
    box-shadow: 0 2px 24px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.06);
  }

  .label {
    font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--muted); margin-bottom: 0.75rem; display: flex; align-items: center; gap: 0.5rem;
  }
  .label-bar { width: 3px; height: 14px; border-radius: 2px; background: linear-gradient(var(--purple-700), var(--blue-700)); flex-shrink: 0; }

  .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 0.75rem; }
  .form-group { display: flex; flex-direction: column; gap: 0.35rem; }
  .form-group label { font-size: 0.75rem; color: var(--muted); font-weight: 600; }
  input[type=text], select, textarea {
    width: 100%; background: var(--input-bg); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px; padding: 0.65rem 0.9rem; color: var(--text);
    font-size: 0.88rem; font-family: inherit; outline: none;
    transition: border-color 0.25s, box-shadow 0.25s;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--purple-700); box-shadow: 0 0 0 3px rgba(124,58,237,0.15); }
  input::placeholder, textarea::placeholder { color: rgba(148,163,184,0.45); }
  textarea { resize: vertical; line-height: 1.6; }
  select option { background: #1a1a3e; }

  /* チェック */
  .check-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 0.5rem; }
  .check-item {
    display: flex; align-items: center; gap: 0.55rem;
    background: var(--glass); border: 1px solid var(--glass-border); border-radius: 10px;
    padding: 0.6rem 0.8rem; cursor: pointer; font-size: 0.83rem; color: var(--muted);
    transition: all 0.2s; user-select: none;
  }
  .check-item:hover { border-color: rgba(124,58,237,0.3); color: var(--text); }
  .check-item.checked { border-color: rgba(124,58,237,0.55); background: rgba(124,58,237,0.12); color: var(--purple-400); }
  .check-box {
    width: 17px; height: 17px; border-radius: 5px; border: 2px solid rgba(255,255,255,0.2);
    flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 0.65rem;
    transition: all 0.2s;
  }
  .check-item.checked .check-box { background: var(--purple-700); border-color: var(--purple-700); color: #fff; }

  /* ステップ入力 */
  .step-list { display: flex; flex-direction: column; gap: 0.6rem; margin-bottom: 0.75rem; }
  .step-row { display: flex; gap: 0.5rem; align-items: center; }
  .step-num {
    width: 28px; height: 28px; border-radius: 8px; flex-shrink: 0;
    background: rgba(124,58,237,0.2); border: 1px solid rgba(124,58,237,0.4);
    color: var(--purple-400); font-size: 0.75rem; font-weight: 800;
    display: flex; align-items: center; justify-content: center;
  }
  .step-row input { flex: 1; }
  .del-btn {
    width: 30px; height: 30px; border-radius: 7px; flex-shrink: 0;
    background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.25);
    color: var(--red-400); cursor: pointer; font-size: 0.9rem;
    display: flex; align-items: center; justify-content: center;
  }

  .btn-add {
    width: 100%; padding: 0.55rem; border-radius: 10px; border: 1px dashed rgba(96,165,250,0.35);
    background: rgba(96,165,250,0.07); color: var(--blue-300); cursor: pointer;
    font-size: 0.85rem; font-family: inherit; transition: all 0.2s;
  }
  .btn-add:hover { background: rgba(96,165,250,0.15); }

  .btn-generate {
    width: 100%; padding: 1rem; border-radius: 14px; border: none; cursor: pointer;
    font-size: 1rem; font-weight: 700; font-family: inherit; color: #fff;
    background: linear-gradient(135deg, #7c3aed, #3b82f6);
    position: relative; overflow: hidden; transition: all 0.2s; margin-top: 0.5rem;
  }
  .btn-generate::after {
    content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
    transition: left 0.5s;
  }
  .btn-generate:hover::after { left: 100%; }

  /* 結果 */
  .result-section { display: none; }

  .manual-wrap {
    background: #fff; color: #1a1a2e; border-radius: 16px; padding: 2.5rem;
    font-family: 'Hiragino Sans', 'Yu Gothic', 'Segoe UI', sans-serif;
    font-size: 0.9rem; line-height: 1.8; margin-bottom: 1.25rem;
  }
  .manual-header { border-bottom: 3px solid #7c3aed; padding-bottom: 1rem; margin-bottom: 1.5rem; }
  .manual-title { font-size: 1.5rem; font-weight: 900; color: #1a1a2e; margin-bottom: 0.25rem; }
  .manual-meta { font-size: 0.78rem; color: #6b7280; display: flex; gap: 1rem; flex-wrap: wrap; }
  .manual-meta span { display: flex; align-items: center; gap: 0.3rem; }

  .manual-section { margin-bottom: 1.75rem; }
  .manual-section-title {
    font-size: 1rem; font-weight: 800; color: #1a1a2e;
    background: #f0f4ff; border-left: 4px solid #7c3aed;
    padding: 0.5rem 0.85rem; border-radius: 0 8px 8px 0; margin-bottom: 0.85rem;
  }
  .manual-section-title .sec-icon { margin-right: 0.4rem; }

  .manual-ul { padding-left: 1.25rem; }
  .manual-ul li { margin-bottom: 0.4rem; color: #374151; }

  .manual-steps { display: flex; flex-direction: column; gap: 0.6rem; }
  .manual-step {
    display: flex; gap: 0.75rem; align-items: flex-start;
    background: #f8fafc; border-radius: 10px; padding: 0.75rem 1rem;
    border: 1px solid #e5e7eb;
  }
  .manual-step-num {
    width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
    background: #7c3aed; color: #fff; font-size: 0.78rem; font-weight: 800;
    display: flex; align-items: center; justify-content: center;
  }
  .manual-step-text { font-size: 0.88rem; color: #1a1a2e; line-height: 1.6; padding-top: 2px; }

  .manual-warning {
    background: #fff7ed; border: 1px solid #fed7aa; border-radius: 10px; padding: 0.85rem 1rem;
    color: #c2410c; font-size: 0.85rem; margin-bottom: 0.5rem;
    display: flex; gap: 0.5rem; align-items: flex-start;
  }

  .manual-trouble { background: #fef2f2; border: 1px solid #fecaca; border-radius: 10px; padding: 0.85rem 1rem; margin-bottom: 0.5rem; }
  .manual-trouble-q { font-size: 0.85rem; font-weight: 700; color: #991b1b; margin-bottom: 0.3rem; }
  .manual-trouble-a { font-size: 0.82rem; color: #374151; }

  .manual-checklist { display: flex; flex-direction: column; gap: 0.4rem; }
  .manual-check-item {
    display: flex; align-items: center; gap: 0.6rem;
    background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 8px; padding: 0.5rem 0.75rem;
    font-size: 0.85rem; color: #166534;
  }
  .check-square { width: 16px; height: 16px; border: 2px solid #16a34a; border-radius: 4px; flex-shrink: 0; }

  .manual-handover { background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 10px; padding: 1rem; }
  .manual-handover p { font-size: 0.85rem; color: #1e40af; line-height: 1.7; }

  .action-bar { display: flex; gap: 0.6rem; flex-wrap: wrap; margin-bottom: 1.25rem; }
  .act-btn {
    padding: 0.6rem 1.1rem; border-radius: 10px; cursor: pointer;
    font-size: 0.82rem; font-weight: 700; font-family: inherit; border: none; transition: all 0.2s;
  }
  .act-copy { background: rgba(52,211,153,0.1); border: 1px solid rgba(52,211,153,0.3); color: var(--green-400); }
  .act-print { background: rgba(96,165,250,0.1); border: 1px solid rgba(96,165,250,0.3); color: var(--blue-300); }
  .act-reset { background: rgba(248,113,113,0.08); border: 1px solid rgba(248,113,113,0.25); color: var(--red-400); }

  .toast {
    position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--green-400); color: #fff; border-radius: 999px;
    padding: 0.65rem 1.5rem; font-size: 0.85rem; font-weight: 700;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3); transition: transform 0.3s; z-index: 200; pointer-events: none;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  @media(max-width:640px) {
    .form-grid { grid-template-columns: 1fr; }
    .check-grid { grid-template-columns: 1fr 1fr; }
    .manual-wrap { padding: 1.25rem; }
  }

  @media print {
    body { background: #fff; padding: 0; }
    .orb, header, .card:not(.result-section), .action-bar { display: none !important; }
    .result-section { display: block !important; }
    .manual-wrap { box-shadow: none; border-radius: 0; }
  }
</style>
</head>
<body>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="toast" id="toast">📋 コピーしました！</div>

<div class="container">
  <header>
    <h1>📋 AI業務マニュアル作成 Pro Lite</h1>
    <p>入力するだけで実務で使える本格マニュアルを自動作成</p>
    <div class="free-badge">✅ 完全無料 · API不要 · インストール不要</div>
  </header>

  <!-- STEP1 基本情報 -->
  <div class="card">
    <div class="label"><div class="label-bar"></div>① 基本情報</div>
    <div class="form-grid">
      <div class="form-group">
        <label>業種 *</label>
        <select id="industry">
          <option value="">選択してください</option>
          <option value="建設業">建設業</option>
          <option value="製造業">製造業</option>
          <option value="印刷・出版">印刷・出版</option>
          <option value="小売業">小売業</option>
          <option value="飲食業">飲食業</option>
          <option value="ホテル・宿泊">ホテル・宿泊</option>
          <option value="医療・介護">医療・介護</option>
          <option value="IT・Web">IT・Web</option>
          <option value="美容・サロン">美容・サロン</option>
          <option value="物流・運送">物流・運送</option>
          <option value="士業・コンサル">士業・コンサル</option>
          <option value="教育・スクール">教育・スクール</option>
          <option value="その他">その他</option>
        </select>
      </div>
      <div class="form-group">
        <label>業務名・マニュアルタイトル *</label>
        <input type="text" id="taskName" placeholder="例：新規顧客への見積書作成手順" />
      </div>
      <div class="form-group">
        <label>対象者</label>
        <select id="target">
          <option value="新人スタッフ">新人スタッフ</option>
          <option value="中途採用者">中途採用者</option>
          <option value="アルバイト・パート">アルバイト・パート</option>
          <option value="全スタッフ共通">全スタッフ共通</option>
          <option value="管理職・リーダー">管理職・リーダー</option>
        </select>
      </div>
      <div class="form-group">
        <label>作業頻度</label>
        <select id="frequency">
          <option value="毎日">毎日</option>
          <option value="週次">週次</option>
          <option value="月次">月次</option>
          <option value="随時">随時（都度発生）</option>
          <option value="年次">年次</option>
        </select>
      </div>
      <div class="form-group">
        <label>作業にかかる時間</label>
        <select id="duration">
          <option value="15分程度">15分程度</option>
          <option value="30分程度">30分程度</option>
          <option value="1時間程度">1時間程度</option>
          <option value="半日程度">半日程度</option>
          <option value="1日程度">1日程度</option>
        </select>
      </div>
      <div class="form-group">
        <label>難易度</label>
        <select id="difficulty">
          <option value="初級（誰でもできる）">初級（誰でもできる）</option>
          <option value="中級（慣れが必要）">中級（慣れが必要）</option>
          <option value="上級（専門知識が必要）">上級（専門知識が必要）</option>
        </select>
      </div>
    </div>
    <div class="form-group" style="margin-top:0.75rem">
      <label>業務の目的・概要 *</label>
      <textarea id="purpose" placeholder="例：お客様から見積依頼を受けた際に、正確かつ迅速に見積書を作成・送付するための手順です。" style="min-height:80px"></textarea>
    </div>
  </div>

  <!-- STEP2 準備するもの -->
  <div class="card">
    <div class="label"><div class="label-bar"></div>② 準備するもの・使用ツール</div>
    <div class="form-group" style="margin-bottom:0.75rem">
      <label>必要な道具・ツール・書類（カンマ区切り）</label>
      <input type="text" id="tools" placeholder="例：パソコン、Excel、会社印鑑、顧客情報リスト" />
    </div>
    <div class="form-group">
      <label>事前に確認すること（任意）</label>
      <input type="text" id="preCheck" placeholder="例：顧客の担当者名、希望納期、数量" />
    </div>
  </div>

  <!-- STEP3 作業手順 -->
  <div class="card">
    <div class="label"><div class="label-bar"></div>③ 作業手順（順番に入力）</div>
    <div class="step-list" id="stepList"></div>
    <button class="btn-add" onclick="addStep()">＋ 手順を追加</button>
  </div>

  <!-- STEP4 注意事項 -->
  <div class="card">
    <div class="label"><div class="label-bar"></div>④ 注意事項・ポイント（任意）</div>
    <div class="form-group">
      <textarea id="warnings" placeholder="例：金額の入力ミスに注意。必ず上長に確認後、送付すること。お客様情報は社外に持ち出し禁止。" style="min-height:80px"></textarea>
    </div>
  </div>

  <!-- STEP5 含めるセクション -->
  <div class="card">
    <div class="label"><div class="label-bar"></div>⑤ マニュアルに含めるセクションを選択</div>
    <div class="check-grid" id="sectionsGrid">
      <div class="check-item checked" data-v="purpose" onclick="toggleCheck(this)"><div class="check-box">✓</div>📌 作業目的</div>
      <div class="check-item checked" data-v="prep" onclick="toggleCheck(this)"><div class="check-box">✓</div>🗂 準備するもの</div>
      <div class="check-item checked" data-v="steps" onclick="toggleCheck(this)"><div class="check-box">✓</div>📝 作業手順</div>
      <div class="check-item checked" data-v="warnings" onclick="toggleCheck(this)"><div class="check-box">✓</div>⚠ 注意事項</div>
      <div class="check-item checked" data-v="troubles" onclick="toggleCheck(this)"><div class="check-box">✓</div>🔧 よくあるトラブル</div>
      <div class="check-item checked" data-v="checklist" onclick="toggleCheck(this)"><div class="check-box">✓</div>✅ チェックリスト</div>
      <div class="check-item checked" data-v="handover" onclick="toggleCheck(this)"><div class="check-box">✓</div>🔄 引き継ぎ事項</div>
    </div>
  </div>

  <button class="btn-generate" onclick="generateManual()">📋 マニュアルを作成する</button>

  <!-- 結果 -->
  <div class="result-section" id="resultSection">
    <div class="action-bar">
      <button class="act-btn act-copy" onclick="copyManual()">📋 テキストコピー</button>
      <button class="act-btn act-print" onclick="window.print()">🖨 印刷・PDF保存</button>
      <button class="act-btn act-reset" onclick="resetAll()">🔄 作り直す</button>
    </div>
    <div class="manual-wrap" id="manualOutput"></div>
  </div>
</div>

<script>
  // ── 状態 ──
  let steps = [];
  let selectedSections = ['purpose','prep','steps','warnings','troubles','checklist','handover'];

  // ── 業種別データ ──
  const industryDB = {
    '建設業': {
      troubles: [
        { q: '図面と現場の寸法が合わない', a: '担当者に連絡し、現地確認・再測量を実施。記録を必ず残す。' },
        { q: '資材の納期が遅れた', a: '代替資材の手配または工程の見直しを行い、顧客へ早急に報告する。' },
        { q: '天候不良で作業が中断', a: '安全を最優先に作業を中断し、翌日以降のスケジュールを再調整する。' },
      ],
      checkItems: ['安全装備の確認', '作業許可書の取得', '図面・仕様書の確認', '資材・工具の準備', '作業完了後の現場清掃', '作業記録の記入'],
      handover: '引き継ぎ時は、進行中の案件リスト・顧客担当者の連絡先・未完了事項・注意が必要な現場情報を必ず申し送ること。',
    },
    '製造業': {
      troubles: [
        { q: '機械が停止した', a: '安全を確保した上で電源を切り、担当者または保守業者へ連絡。自己判断で修理しない。' },
        { q: '製品に不良が発生した', a: '該当ロットを隔離し、品質管理担当へ報告。原因究明と是正措置を記録する。' },
        { q: '原材料が不足した', a: '在庫担当者に即報告。代替品の手配または生産スケジュールの調整を行う。' },
      ],
      checkItems: ['安全装備の着用', '機械の始業点検', '作業指示書の確認', '品質基準の確認', '作業後の清掃・整理整頓', '日報の記入'],
      handover: '製造進捗・在庫状況・機械の不具合情報・品質上の懸念事項を申し送ること。',
    },
    '飲食業': {
      troubles: [
        { q: '食材が不足した', a: '責任者に報告し、近隣の仕入先または緊急購入を手配。メニューの一時停止も検討。' },
        { q: 'お客様からクレームがあった', a: 'まず誠意をもって謝罪し、責任者へ即座に引き継ぐ。内容を必ず記録する。' },
        { q: '機器が故障した', a: '使用を中止し、責任者に報告。代替方法を検討し修理業者へ連絡する。' },

  // ── 初期化 ──
  addStep(); addStep(); addStep();

  function addStep() {
    steps.push('');
    renderSteps();
  }

  function removeStep(idx) {
    if (steps.length <= 1) { steps[0] = ''; renderSteps(); return; }
    steps.splice(idx, 1);
    renderSteps();
  }

  function renderSteps() {
    document.getElementById('stepList').innerHTML = steps.map((s, i) => `
      <div class="step-row">
        <div class="step-num">${i + 1}</div>
        <input type="text" value="${esc(s)}" placeholder="例：Excelを開き、見積書テンプレートを選択する" oninput="steps[${i}]=this.value" />
        <button class="del-btn" onclick="removeStep(${i})">×</button>
      </div>`).join('');
  }

  function toggleCheck(el) {
    el.classList.toggle('checked');
    const v = el.getAttribute('data-v');
    if (el.classList.contains('checked')) {
      if (!selectedSections.includes(v)) selectedSections.push(v);
    } else {
      selectedSections = selectedSections.filter(x => x !== v);
    }
  }

  // ── マニュアル生成 ──
  function generateManual() {
    const industry = document.getElementById('industry').value;
    const taskName = document.getElementById('taskName').value.trim();
    const target = document.getElementById('target').value;
    const frequency = document.getElementById('frequency').value;
    const duration = document.getElementById('duration').value;
    const difficulty = document.getElementById('difficulty').value;
    const purpose = document.getElementById('purpose').value.trim();
    const tools = document.getElementById('tools').value.trim();
    const preCheck = document.getElementById('preCheck').value.trim();
    const warnings = document.getElementById('warnings').value.trim();
    const validSteps = steps.filter(s => s.trim());

    if (!industry || !taskName || !purpose) {
      alert('業種・業務名・業務の目的は必須です');
      return;
    }
    if (validSteps.length === 0) {
      alert('作業手順を1つ以上入力してください');
      return;
    }

    const db = industryDB[industry] || industryDB['その他'];
    const today = new Date().toLocaleDateString('ja-JP', { year: 'numeric', month: 'long', day: 'numeric' });

    let html = `
      <div class="manual-header">
        <div class="manual-title">📋 ${taskName}</div>
        <div class="manual-meta">
          <span>🏭 ${industry}</span>
          <span>👤 対象：${target}</span>
          <span>🔁 頻度：${frequency}</span>
          <span>⏱ 所要時間：${duration}</span>
          <span>📊 難易度：${difficulty}</span>
          <span>📅 作成日：${today}</span>
        </div>
      </div>`;

    // 作業目的
    if (selectedSections.includes('purpose')) {
      html += `<div class="manual-section">
        <div class="manual-section-title"><span class="sec-icon">📌</span>作業目的</div>
        <p>${purpose}</p>
      </div>`;
    }

    // 準備するもの
    if (selectedSections.includes('prep') && (tools || preCheck)) {
      html += `<div class="manual-section">
        <div class="manual-section-title"><span class="sec-icon">🗂</span>準備するもの</div>`;
      if (tools) {
        const toolList = tools.split(/[,、，]/).map(t => t.trim()).filter(Boolean);
        html += `<ul class="manual-ul">${toolList.map(t => `<li>${t}</li>`).join('')}</ul>`;
      }
      if (preCheck) {
        html += `<p style="margin-top:0.5rem;font-size:0.85rem;color:#6b7280">📝 事前確認事項：${preCheck}</p>`;
      }
      html += `</div>`;
    }

    // 作業手順
    if (selectedSections.includes('steps')) {
      html += `<div class="manual-section">
        <div class="manual-section-title"><span class="sec-icon">📝</span>作業手順</div>
        <div class="manual-steps">
          ${validSteps.map((s, i) => `
            <div class="manual-step">
              <div class="manual-step-num">${i + 1}</div>
              <div class="manual-step-text">${s}</div>
            </div>`).join('')}
        </div>
      </div>`;
    }

    // 注意事項
    if (selectedSections.includes('warnings')) {
      const warnList = warnings
        ? warnings.split(/[。\n]/).map(w => w.trim()).filter(Boolean)
        : [`${taskName}の作業中は、確認漏れや入力ミスがないよう注意する`, `不明な点は必ず担当者に確認してから作業を進める`, `作業完了後は必ず記録・報告を行う`];

      html += `<div class="manual-section">
        <div class="manual-section-title"><span class="sec-icon">⚠️</span>注意事項</div>
        ${warnList.map(w => `<div class="manual-warning"><span>⚠</span><span>${w}</span></div>`).join('')}
      </div>`;
    }

    // よくあるトラブル
    if (selectedSections.includes('troubles')) {
      html += `<div class="manual-section">
        <div class="manual-section-title"><span class="sec-icon">🔧</span>よくあるトラブルと対処法</div>
        ${db.troubles.map(t => `
          <div class="manual-trouble">
            <div class="manual-trouble-q">❓ ${t.q}</div>
            <div class="manual-trouble-a">→ ${t.a}</div>
          </div>`).join('')}
      </div>`;
    }

    // チェックリスト
    if (selectedSections.includes('checklist')) {
      html += `<div class="manual-section">
        <div class="manual-section-title"><span class="sec-icon">✅</span>作業チェックリスト</div>
        <div class="manual-checklist">
          ${validSteps.map(s => `
            <div class="manual-check-item">
              <div class="check-square"></div>
              <span>${s}</span>
            </div>`).join('')}
          ${db.checkItems.map(c => `
            <div class="manual-check-item">
              <div class="check-square"></div>
              <span>${c}</span>
            </div>`).join('')}
        </div>
      </div>`;
    }

    // 引き継ぎ事項
    if (selectedSections.includes('handover')) {
      html += `<div class="manual-section">
        <div class="manual-section-title"><span class="sec-icon">🔄</span>引き継ぎ事項</div>
        <div class="manual-handover">
          <p>${db.handover}</p>
          <p style="margin-top:0.5rem">本マニュアルの内容に変更が生じた場合は、速やかに更新し関係者へ周知すること。</p>
        </div>
      </div>`;
    }

    html += `<div style="border-top:1px solid #e5e7eb;padding-top:1rem;margin-top:1rem;font-size:0.75rem;color:#9ca3af;text-align:right">
      作成：${today} | AI業務マニュアル作成 Pro Lite
    </div>`;

    document.getElementById('manualOutput').innerHTML = html;
    document.getElementById('resultSection').style.display = 'block';
    document.getElementById('resultSection').scrollIntoView({ behavior: 'smooth' });
  }

  // ── コピー ──
  function copyManual() {
    const el = document.getElementById('manualOutput');
    navigator.clipboard.writeText(el.innerText).then(() => {
      const t = document.getElementById('toast');
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2000);
    });
  }

  function resetAll() {
    document.getElementById('resultSection').style.display = 'none';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
