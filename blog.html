    .blog-hero {

    .blog-hero::before {

      position: absolute;
      top: -200px; left: 50%;

      background: radial-gradient(circle, rgba(155,89,245,0.12), transparent 70%);

    .blog-hero h1 {

      font-size: clamp(2rem, 5vw, 3.2rem);

    .blog-hero p { color: var(--c-text-sub); font-size: 1rem; }
    .blog-hero .article-meta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 16px;
      font-size: 0.85rem;
      color: var(--c-text-sub);
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);

      padding: 6px 16px;
      backdrop-filter: var(--glass-blur);
    }

    .blog-page-body { padding: 0 0 120px; }

    .blog-page-categories {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 48px;
    }

    .blog-page-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 28px;
    }

    /* ローディング表示 */
    .blog-loading {
      text-align: center;
      padding: 80px 0;
      color: var(--c-text-sub);
      font-size: 0.95rem;
    }
    .blog-loading::after {
      content: '';
      display: block;
      width: 32px; height: 32px;
      border: 2px solid var(--glass-border);
      border-top-color: var(--c-blue);
      border-radius: 50%;
      margin: 16px auto 0;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
