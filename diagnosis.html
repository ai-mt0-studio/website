      desc: 'AIをまだ十分に活用できていない段階です。まずはメール文章や資料の下書きなど、身近な業務を1つ選んでAIに任せてみましょう。小さな成功体験を積むことが、活用度を上げる一番の近道です。',
    },
    intermediate: {
      label: 'AI活用中級者', emoji: '⚡', color: '#60a5fa',
      desc: '日常的にAIを使い始めていますが、活用範囲や自動化にはまだ伸びしろがあります。使う業務の幅を広げたり、専用ツールへの置き換え・テンプレート化を進めることで、さらなる時短が期待できます。',
    },
    advanced: {
      label: 'AI活用上級者', emoji: '🚀', color: '#34d399',
      desc: '複数の業務でAIを使いこなし、時短・効率化がすでに定着しています。次のステップとして、専用ツールの導入や業務フローの仕組み化を進めることで、チーム・会社全体の生産性向上にもつなげられます。',
    },
  };

  // ── Q10 自由入力とのキーワードマッチング → おすすめツール ──
  const TOOL_MATCHES = [
    { keys: ['見積書', '見積', '請求書', '請求'], icon: '🧾', name: 'AI見積書・請求書作成ツール', desc: '見積書・請求書の作成をAIがサポート。品名・単価の入力だけでプロ品質の書類をスピーディに作成できます。', url: 'invoice-tool.html' },
    { keys: ['議事録', '会議'], icon: '🎙️', name: 'AI議事録ツール', desc: '会議の録音や文字起こしをAIが自動で要約・整形。そのまま共有できる議事録に仕上がります。', url: 'https://note.com/safe_acacia2730/n/nd10e39a5b1a9' },
    { keys: ['日報', '週報', '業務報告'], icon: '📝', name: 'AI日報生成ツール', desc: '業務内容を入力するだけでAIが日報・週報をビジネス文章に自動整形します。', url: 'report-tool.html' },
    { keys: ['マニュアル', '引き継ぎ', '新人教育'], icon: '📋', name: 'AI業務マニュアル作成 Pro Lite（無料）', desc: '業種・業務内容を入力するだけで、誰でも使える業務マニュアルを自動作成。引き継ぎ・新人教育に最適です。', url: 'manual-tool.html' },
    { keys: ['経理', '帳簿', '会計', '仕訳', '確定申告'], icon: '📊', name: '経理・帳簿ツール', desc: '売上・経費を入力するだけでAIが自動分析。利益率・消費税・インボイス管理まで対応します。', url: 'https://note.com/safe_acacia2730/n/n974e7530893c' },
    { keys: ['sns', 'SNS', 'インスタ', 'ツイッター', 'X投稿', '投稿文'], icon: '✦', name: 'SNS投稿自動生成ツール', desc: 'テーマを入力するだけでX・Instagram・Facebook・LinkedIn向けの投稿文をAIが自動生成します。', url: 'sns-tool.html' },
    { keys: ['営業'], icon: '✉️', name: 'AI営業文作成 Pro Lite（無料）', desc: '会社名・業種・提案内容を入力するだけで、営業メール・提案文をAIが自動生成。完全無料で使えます。', url: 'sales-mail-tool.html' },
    { keys: ['メール'], icon: '✉️', name: 'AI営業文作成 Pro Lite（無料）', desc: '状況を入力するだけでビジネスメールの下書きをAIが自動生成。メール対応の時短に役立ちます。', url: 'sales-mail-tool.html' },
    { keys: ['資料', '文章', '提案書', '企画書'], icon: '✍️', name: '資料・文章作成ツール', desc: '目的を選ぶだけでAIがビジネス文章を自動作成。リライト・要約・翻訳・誤字脱字チェックにも対応します。', url: 'https://note.com/safe_acacia2730/n/nd306683712ee' },
    { keys: ['顧客', '営業管理', '案件管理'], icon: '🔍', name: 'AI業務改善アドバイザー Pro Lite（無料）', desc: '業種・課題を入力するだけでAIが業務改善の優先順位や具体的な改善方法を提案します。', url: 'advisor-tool.html' },
  ];
  const FALLBACK_TOOL = { icon: '🏢', name: 'AI Business OS（無料）', desc: '見積書・顧客管理・営業管理・分析グラフまで全部入りの無料ツール。まずはこの1つで業務全体の効率化を体験してみましょう。', url: 'business-os.html' };

  // ── 状態 ──
  let currentQ = 0;
  let answers = new Array(QUESTIONS.length).fill(null);
  let lastResult = null;

  // ── 設問の描画 ──
  function buildSteps() {
    let html = '';
    QUESTIONS.forEach((q, i) => {
      html += `
      <div class="q-step" id="qstep${i}" style="display:${i === 0 ? 'block' : 'none'}">
        <div class="card">
          <div class="step-title"><span class="step-badge">Q${i + 1} / ${TOTAL_STEPS}</span>${esc(q.q)}</div>
          <div class="opt-list">
            ${q.options.map(o => `<button type="button" class="opt-btn" data-qi="${i}" data-score="${o.score}" onclick="selectOption(this)">${esc(o.label)}</button>`).join('')}
          </div>
        </div>
        <div class="nav-btns">
          ${i > 0 ? `<button class="btn btn-secondary" onclick="goQ(${i - 1})">← 戻る</button>` : '<div></div>'}
          <button class="btn btn-primary" id="nextBtn${i}" onclick="goQ(${i + 1})" disabled>次へ →</button>
        </div>
      </div>`;
    });
    const lastIdx = QUESTIONS.length;
    html += `
      <div class="q-step" id="qstep${lastIdx}" style="display:none">
        <div class="card">
          <div class="step-title"><span class="step-badge">Q10 / ${TOTAL_STEPS}</span>一番時間がかかっている作業を教えてください（自由入力・任意）</div>
          <textarea id="freeTextAnswer" placeholder="例：毎月の請求書・見積書の作成に時間がかかっている、SNS投稿の作成に時間を取られている、など"></textarea>
        </div>
        <div class="nav-btns">
          <button class="btn btn-secondary" onclick="goQ(${lastIdx - 1})">← 戻る</button>
          <button class="btn-diagnose" onclick="runDiagnosis()">🎯 診断結果を見る</button>
        </div>
      </div>`;
    document.getElementById('quizSteps').innerHTML = html;
  }

  function selectOption(btn) {
    const qi = +btn.dataset.qi;
    btn.parentElement.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    answers[qi] = +btn.dataset.score;
    const nextBtn = document.getElementById('nextBtn' + qi);
    if (nextBtn) nextBtn.disabled = false;
  }

  function goQ(n) {
    if (n < 0 || n > QUESTIONS.length) return;
    document.getElementById('qstep' + currentQ).style.display = 'none';
    currentQ = n;
    document.getElementById('qstep' + currentQ).style.display = 'block';
    updateProgress();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function updateProgress() {
    const pct = ((currentQ + 1) / TOTAL_STEPS) * 100;
    document.getElementById('progFill').style.width = pct + '%';
    document.getElementById('progText').textContent = `Q${currentQ + 1} / ${TOTAL_STEPS}`;
  }

  // ── 診断実行 ──
  function runDiagnosis() {
    document.getElementById('quizSection').style.display = 'none';
    document.getElementById('analyzingSection').style.display = 'block';
    window.scrollTo({ top: 0, behavior: 'smooth' });

    setTimeout(() => {
      const result = buildResult();
      lastResult = result;
      renderResult(result);
      document.getElementById('analyzingSection').style.display = 'none';
      document.getElementById('resultSection').style.display = 'block';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }, 1600);
  }

  function buildResult() {
    let sum = 0;
    answers.forEach(a => { if (a !== null) sum += a; });
    const score = Math.max(0, Math.min(100, 50 + sum));

    let tierKey;
    if (score >= 70) tierKey = 'advanced';
    else if (score >= 40) tierKey = 'intermediate';
    else tierKey = 'beginner';

    const freeText = (document.getElementById('freeTextAnswer').value || '').trim();
    const tool = matchTool(freeText);

    return { score, tierKey, tierInfo: TIER_INFO[tierKey], freeText, tool };
  }

  function matchTool(text) {
    if (text) {
      const upper = text.toUpperCase();
      for (const m of TOOL_MATCHES) {
        if (m.keys.some(k => upper.includes(k.toUpperCase()))) return m;
      }
    }
    return FALLBACK_TOOL;
  }

  function renderResult(r) {
    document.getElementById('scoreValue').textContent = r.score;

    const tierEl = document.getElementById('scoreTier');
    tierEl.textContent = `${r.tierInfo.emoji} ${r.tierInfo.label}`;
    tierEl.style.background = r.tierInfo.color + '26';
    tierEl.style.border = '1px solid ' + r.tierInfo.color + '66';
    tierEl.style.color = r.tierInfo.color;

    document.getElementById('scoreSummary').textContent =
      `あなたのAI業務効率スコアは${r.score}点で「${r.tierInfo.label}」タイプです。`;

    document.getElementById('typeDesc').textContent = r.tierInfo.desc;

    const isExternal = r.tool.url.startsWith('http');
    document.getElementById('recommendInner').innerHTML = `
      <div class="recommend-inner">
        <div class="recommend-icon">${r.tool.icon}</div>
        <div class="recommend-body">
          <div class="recommend-name">${esc(r.tool.name)}</div>
          ${r.freeText ? `<div class="recommend-reason">「${esc(r.freeText.slice(0, 40))}${r.freeText.length > 40 ? '…' : ''}」の内容から診断</div>` : ''}
          <div class="recommend-desc">${esc(r.tool.desc)}</div>
          <a href="${r.tool.url}" class="btn btn-primary"${isExternal ? ' target="_blank" rel="noopener"' : ''}>詳しく見る →</a>
        </div>
      </div>`;
  }

  // ── シェア ──
  function buildShareText() {
    if (!lastResult) return '';
    return `AI業務効率スコア診断をやってみたら${lastResult.score}点で「${lastResult.tierInfo.label}」でした${lastResult.tierInfo.emoji}\nあなたのAI活用度もチェックしてみませんか？\n#AI業務効率スコア診断 #AIMT0Studio`;
  }

  function shareX() {
    const url = 'https://twitter.com/intent/tweet?text=' + encodeURIComponent(buildShareText()) + '&url=' + encodeURIComponent(PAGE_URL);
    window.open(url, '_blank', 'noopener');
  }

  function shareThreads() {
    const text = buildShareText() + '\n' + PAGE_URL;
    const url = 'https://www.threads.net/intent/post?text=' + encodeURIComponent(text);
    window.open(url, '_blank', 'noopener');
  }

  // ── リセット ──
  function resetAll() {
    if (!confirm('診断をリセットしますか？')) return;
    answers = new Array(QUESTIONS.length).fill(null);
    currentQ = 0;
    lastResult = null;
    buildSteps();
    updateProgress();
    document.getElementById('resultSection').style.display = 'none';
    document.getElementById('quizSection').style.display = 'block';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function esc(s) {
    return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  buildSteps();
  updateProgress();
</script>
</body>
</html>
