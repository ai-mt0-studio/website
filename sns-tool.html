<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SNS投稿自動生成ツール</title>
  <style>
    :root {
      --bg: #06061a;
      --purple-700: #7c3aed;
      --purple-400: #a78bfa;
      --blue-700: #1d4ed8;
      --blue-400: #60a5fa;
      --blue-300: #93c5fd;
      --green-400: #34d399;
      --red-400: #f87171;
      --yellow-400: #fbbf24;
      --pink-400: #f472b6;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --glass: rgba(255,255,255,0.04);
      --glass-border: rgba(255,255,255,0.09);
      --input-bg: rgba(0,0,0,0.35);
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-color: var(--bg);
      background-image:
        radial-gradient(ellipse 60% 50% at 15% 40%, rgba(124,58,237,0.15) 0%, transparent 70%),
        radial-gradient(ellipse 50% 40% at 85% 15%, rgba(29,78,216,0.15) 0%, transparent 70%),
        radial-gradient(ellipse 40% 35% at 50% 90%, rgba(59,7,100,0.18) 0%, transparent 70%);
      min-height: 100vh;
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      padding: 2rem 1rem 5rem;
    }
    .orb { position: fixed; border-radius: 50%; filter: blur(90px); opacity: 0.1; pointer-events: none; z-index: 0; }
    .orb-1 { width: 500px; height: 500px; background: var(--purple-700); top: -150px; right: -150px; }
    .orb-2 { width: 380px; height: 380px; background: var(--blue-700); bottom: 50px; left: -120px; }

    .container { max-width: 1100px; margin: 0 auto; position: relative; z-index: 1; }

    header { text-align: center; margin-bottom: 2rem; }
    header h1 {
      font-size: clamp(1.8rem, 4vw, 2.6rem); font-weight: 800; letter-spacing: -0.02em;
      background: linear-gradient(130deg, var(--blue-300) 0%, var(--purple-400) 60%, var(--pink-400) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      margin-bottom: 0.4rem;
    }
    header p { color: var(--muted); font-size: 0.9rem; }

    /* タブ */
    .tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .tab {
      padding: 0.55rem 1.2rem; border-radius: 10px; cursor: pointer; font-size: 0.88rem; font-weight: 600;
      border: 1px solid var(--glass-border); background: var(--glass); color: var(--muted); transition: all 0.2s;
    }
    .tab.active { background: linear-gradient(135deg, var(--purple-700), var(--blue-700)); border-color: transparent; color: #fff; }
    .tab:hover:not(.active) { border-color: rgba(124,58,237,0.4); color: var(--text); }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* カード */
    .card {
      background: var(--glass); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--glass-border); border-radius: 18px; padding: 1.5rem; margin-bottom: 1.25rem;
      box-shadow: 0 2px 24px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.06);
    }
    .card.api-card { border-color: rgba(124,58,237,0.2); background: rgba(124,58,237,0.05); }

    .label {
      font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--muted); margin-bottom: 0.75rem; display: flex; align-items: center; gap: 0.5rem;
    }
    .label-bar { width: 3px; height: 14px; border-radius: 2px; background: linear-gradient(var(--purple-700), var(--blue-700)); flex-shrink: 0; }

    /* フォーム */
    .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 0.85rem; }
    .form-group { display: flex; flex-direction: column; gap: 0.35rem; }
    .form-group label { font-size: 0.75rem; color: var(--muted); font-weight: 600; }
    input, select, textarea {
      width: 100%; background: var(--input-bg); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px; padding: 0.65rem 0.9rem; color: var(--text);
      font-size: 0.88rem; font-family: inherit; outline: none;
      transition: border-color 0.25s, box-shadow 0.25s;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--purple-700); box-shadow: 0 0 0 3px rgba(124,58,237,0.15); }
    input::placeholder, textarea::placeholder { color: rgba(148,163,184,0.45); }
    textarea { resize: vertical; min-height: 100px; line-height: 1.6; }
    select option { background: #1a1a3e; }

    /* トグル */
    .toggle-row { display: flex; align-items: center; gap: 0.75rem; }
    .toggle { position: relative; width: 44px; height: 24px; flex-shrink: 0; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute; inset: 0; background: rgba(255,255,255,0.1); border-radius: 999px;
      cursor: pointer; transition: 0.3s; border: 1px solid rgba(255,255,255,0.15);
    }
    .toggle-slider::before {
      content: ''; position: absolute; width: 18px; height: 18px; background: #fff;
      border-radius: 50%; left: 2px; top: 2px; transition: 0.3s;
    }
    .toggle input:checked + .toggle-slider { background: var(--purple-700); border-color: var(--purple-700); }
    .toggle input:checked + .toggle-slider::before { transform: translateX(20px); }
    .toggle-label { font-size: 0.85rem; color: var(--text); }

    /* チェックボックスグループ */
    .check-group { display: flex; flex-wrap: wrap; gap: 0.5rem; }
    .check-item {
      display: flex; align-items: center; gap: 0.4rem;
      background: var(--input-bg); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px; padding: 0.45rem 0.85rem; cursor: pointer;
      font-size: 0.82rem; transition: all 0.2s;
    }
    .check-item input { width: auto; background: none; border: none; padding: 0; }
    .check-item:has(input:checked) { border-color: rgba(124,58,237,0.5); background: rgba(124,58,237,0.12); color: var(--purple-400); }

    /* ボタン */
    .btn-generate {
      width: 100%; padding: 1rem; border-radius: 14px; border: none; cursor: pointer;
      font-size: 1rem; font-weight: 700; font-family: inherit; color: #fff;
      background: linear-gradient(135deg, #7c3aed, #3b82f6);
      position: relative; overflow: hidden; transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
      margin-top: 0.75rem;
    }
    .btn-generate::after {
      content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
      transition: left 0.5s;
    }
    .btn-generate:hover:not(:disabled)::after { left: 100%; }
    .btn-generate:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(124,58,237,0.4); }
    .btn-generate:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-copy {
      background: rgba(52,211,153,0.1); border: 1px solid rgba(52,211,153,0.3); color: var(--green-400);
      padding: 0.4rem 0.85rem; border-radius: 8px; cursor: pointer; font-size: 0.78rem; font-family: inherit;
      transition: background 0.2s;
    }
    .btn-copy:hover { background: rgba(52,211,153,0.2); }
    .btn-copy.copied { background: rgba(52,211,153,0.25); border-color: rgba(52,211,153,0.6); }

    .btn-fav {
      background: rgba(251,191,36,0.1); border: 1px solid rgba(251,191,36,0.3); color: var(--yellow-400);
      padding: 0.4rem 0.85rem; border-radius: 8px; cursor: pointer; font-size: 0.78rem; font-family: inherit;
      transition: background 0.2s;
    }
    .btn-fav:hover { background: rgba(251,191,36,0.2); }
    .btn-fav.active { background: rgba(251,191,36,0.25); border-color: rgba(251,191,36,0.6); }

    .btn-sm {
      padding: 0.35rem 0.75rem; border-radius: 7px; border: none; cursor: pointer;
      font-size: 0.75rem; font-weight: 600; font-family: inherit; transition: all 0.2s;
    }
    .btn-edit { background: rgba(96,165,250,0.1); border: 1px solid rgba(96,165,250,0.3); color: var(--blue-400); }
    .btn-edit:hover { background: rgba(96,165,250,0.2); }
    .btn-del { background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.3); color: var(--red-400); }
    .btn-del:hover { background: rgba(248,113,113,0.2); }

    /* API key */
    .api-row { position: relative; }
    .api-row input { padding-right: 2.8rem; font-family: monospace; letter-spacing: 0.04em; }
    .toggle-btn { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--muted); font-size: 1rem; }
    .toggle-btn:hover { color: var(--text); }

    /* ローディング */
    .loading { display: none; text-align: center; padding: 1.5rem; }
    .spinner {
      width: 44px; height: 44px; margin: 0 auto 0.75rem;
      border: 3px solid rgba(124,58,237,0.2); border-top-color: var(--purple-700);
      border-radius: 50%; animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading p { color: var(--muted); font-size: 0.88rem; }

    .error-box {
      display: none; background: rgba(248,113,113,0.08); border: 1px solid rgba(248,113,113,0.3);
      border-radius: 12px; padding: 1rem; color: var(--red-400); font-size: 0.85rem;
      white-space: pre-wrap; margin-bottom: 1rem;
    }

    /* 結果 */
    .result-section { display: none; }
    .pattern-tabs { display: flex; gap: 0.4rem; margin-bottom: 1rem; }
    .pattern-tab {
      padding: 0.4rem 1rem; border-radius: 8px; cursor: pointer; font-size: 0.82rem; font-weight: 700;
      border: 1px solid var(--glass-border); background: var(--glass); color: var(--muted); transition: all 0.2s;
    }
    .pattern-tab.active { background: rgba(124,58,237,0.2); border-color: rgba(124,58,237,0.5); color: var(--purple-400); }

    .platform-card {
      background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.07);
      border-radius: 14px; padding: 1.25rem; margin-bottom: 1rem;
    }
    .platform-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; }
    .platform-name { font-size: 0.8rem; font-weight: 700; display: flex; align-items: center; gap: 0.4rem; }
    .platform-actions { display: flex; gap: 0.4rem; align-items: center; }
    .char-count { font-size: 0.72rem; color: var(--muted); }
    .char-count.over { color: var(--red-400); }
    .post-text {
      font-size: 0.88rem; line-height: 1.8; color: var(--text);
      white-space: pre-wrap; word-break: break-word;
    }

    /* タイトル候補 */
    .title-list { display: flex; flex-direction: column; gap: 0.5rem; margin-top: 0.5rem; }
    .title-item {
      background: rgba(124,58,237,0.06); border: 1px solid rgba(124,58,237,0.18);
      border-radius: 10px; padding: 0.75rem 1rem; font-size: 0.88rem;
      display: flex; justify-content: space-between; align-items: center; gap: 0.75rem;
    }

    /* AI改善アドバイス */
    .advice-list { display: flex; flex-direction: column; gap: 0.6rem; margin-top: 0.5rem; }
    .advice-item {
      background: rgba(29,78,216,0.07); border: 1px solid rgba(29,78,216,0.2);
      border-radius: 10px; padding: 0.85rem 1rem; font-size: 0.85rem; line-height: 1.7;
      display: flex; gap: 0.6rem;
    }

    /* 履歴 */
    .history-list { display: flex; flex-direction: column; gap: 0.75rem; }
    .history-item {
      background: rgba(0,0,0,0.25); border: 1px solid rgba(255,255,255,0.07);
      border-radius: 14px; padding: 1rem 1.25rem; transition: border-color 0.2s;
    }
    .history-item:hover { border-color: rgba(124,58,237,0.3); }
    .history-item.is-fav { border-color: rgba(251,191,36,0.3); background: rgba(251,191,36,0.03); }
    .history-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.5rem; gap: 0.75rem; }
    .history-theme { font-size: 0.9rem; font-weight: 700; color: var(--text); flex: 1; }
    .history-meta { font-size: 0.72rem; color: var(--muted); margin-bottom: 0.5rem; }
    .history-preview { font-size: 0.82rem; color: var(--muted); line-height: 1.6; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .history-actions { display: flex; gap: 0.4rem; flex-shrink: 0; }
    .fav-star { color: var(--yellow-400); font-size: 0.8rem; }
    .empty { text-align: center; color: var(--muted); padding: 2rem; font-size: 0.85rem; }

    .filter-tabs { display: flex; gap: 0.4rem; margin-bottom: 1rem; flex-wrap: wrap; }
    .filter-tab {
      padding: 0.35rem 0.85rem; border-radius: 8px; cursor: pointer; font-size: 0.78rem;
      border: 1px solid var(--glass-border); background: var(--glass); color: var(--muted); transition: all 0.2s;
    }
    .filter-tab.active { background: rgba(124,58,237,0.2); border-color: rgba(124,58,237,0.4); color: var(--purple-400); font-weight: 700; }

    @media(max-width:640px) {
      .form-grid { grid-template-columns: 1fr; }
      .pattern-tabs { flex-wrap: wrap; }
    }
  </style>
</head>
<body>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="container">
  <header>
    <h1>✦ SNS投稿自動生成ツール</h1>
    <p>テーマを入力するだけでX・Instagram・Facebook・LinkedInの投稿を自動生成</p>
  </header>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('generate')">✦ 生成</div>
    <div class="tab" onclick="switchTab('history')">📋 履歴</div>
    <div class="tab" onclick="switchTab('favorites')">⭐ お気に入り</div>
  </div>

  <!-- 生成タブ -->
  <div class="tab-content active" id="tab-generate">

    <!-- API Key -->
    <div class="card api-card">
      <div class="label"><div class="label-bar"></div>Claude API 設定</div>
      <div class="api-row">
        <input type="password" id="apiKey" placeholder="sk-ant-api03-..." autocomplete="off" />
        <button class="toggle-btn" onclick="toggleKey()">👁</button>
      </div>
    </div>

    <!-- 入力 -->
    <div class="card">
      <div class="label"><div class="label-bar"></div>投稿内容の設定</div>
      <div class="form-group" style="margin-bottom:0.85rem">
        <label>投稿したいテーマ・内容 *</label>
        <textarea id="theme" placeholder="例：新しいAIツールをリリースしました。業務効率化に役立つ日報自動生成機能です。"></textarea>
      </div>
      <div class="form-grid">
        <div class="form-group">
          <label>ターゲット</label>
          <select id="target">
            <option>一般</option>
            <option>ビジネス・会社員</option>
            <option>主婦・主夫</option>
            <option>学生</option>
            <option>フリーランス・個人事業主</option>
            <option>経営者・起業家</option>
          </select>
        </div>
        <div class="form-group">
          <label>トーン</label>
          <select id="tone">
            <option>プロフェッショナル</option>
            <option>カジュアル</option>
            <option>熱量高め</option>
            <option>親しみやすい</option>
          </select>
        </div>
        <div class="form-group">
          <label>ハッシュタグ数</label>
          <select id="hashtagCount">
            <option value="0">0個（なし）</option>
            <option value="3">3個</option>
            <option value="5" selected>5個</option>
            <option value="8">8個</option>
            <option value="10">10個</option>
          </select>
        </div>
        <div class="form-group">
          <label>CTA（行動喚起）</label>
          <select id="cta">
            <option value="">なし</option>
            <option>プロフィールを見る</option>
            <option>詳細はこちら</option>
            <option>お問い合わせはDMへ</option>
            <option>URLはプロフィールから</option>
            <option>コメントで教えてください</option>
            <option>フォローをお願いします</option>
          </select>
        </div>
      </div>
      <div style="display:flex;gap:1.5rem;margin-top:0.85rem;flex-wrap:wrap">
        <label class="toggle-row">
          <span class="toggle"><input type="checkbox" id="useEmoji" checked><span class="toggle-slider"></span></span>
          <span class="toggle-label">絵文字を使用する</span>
        </label>
      </div>
    </div>

    <button class="btn-generate" id="generateBtn" onclick="generatePosts()">✦ 投稿を生成する（A・B・Cの3パターン）</button>

    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p>Claude AI が投稿を生成中です…</p>
    </div>
    <div class="error-box" id="errorBox"></div>

    <!-- 結果 -->
    <div class="result-section" id="resultSection">

      <!-- タイトル候補 -->
      <div class="card">
        <div class="label"><div class="label-bar"></div>タイトル候補（3案）</div>
        <div class="title-list" id="titleList"></div>
      </div>

      <!-- パターン選択 -->
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;flex-wrap:wrap;gap:0.5rem">
          <div class="label" style="margin-bottom:0"><div class="label-bar"></div>生成された投稿</div>
          <div style="display:flex;gap:0.5rem;align-items:center">
            <button class="btn-fav" id="favBtn" onclick="toggleFav()">⭐ お気に入り</button>
            <button class="btn-sm btn-edit" onclick="saveToHistory()">💾 履歴に保存</button>
          </div>
        </div>
        <div class="pattern-tabs">
          <div class="pattern-tab active" onclick="showPattern(0)">パターン A</div>
          <div class="pattern-tab" onclick="showPattern(1)">パターン B</div>
          <div class="pattern-tab" onclick="showPattern(2)">パターン C</div>
        </div>
        <div id="patternContent"></div>
      </div>

      <!-- AI改善アドバイス -->
      <div class="card">
        <div class="label"><div class="label-bar"></div>AI改善アドバイス</div>
        <div class="advice-list" id="adviceList"></div>
      </div>

    </div>
  </div>

  <!-- 履歴タブ -->
  <div class="tab-content" id="tab-history">
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
        <div class="label" style="margin-bottom:0"><div class="label-bar"></div>投稿履歴</div>
        <button class="btn-sm btn-del" onclick="clearAllHistory()">🗑 全て削除</button>
      </div>
      <div class="filter-tabs">
        <div class="filter-tab active" onclick="setFilter('all')">すべて</div>
        <div class="filter-tab" onclick="setFilter('fav')">⭐ お気に入りのみ</div>
      </div>
      <div class="history-list" id="historyList"></div>
    </div>
  </div>

  <!-- お気に入りタブ -->
  <div class="tab-content" id="tab-favorites">
    <div class="card">
      <div class="label"><div class="label-bar"></div>お気に入り</div>
      <div class="history-list" id="favList"></div>
    </div>
  </div>

</div>

<script>
  // ── データ ──
  let history = JSON.parse(localStorage.getItem('sns_history') || '[]');
  let currentResult = null;
  let currentFav = false;
  let activePattern = 0;
  let historyFilter = 'all';

  function saveHistory() { localStorage.setItem('sns_history', JSON.stringify(history)); }

  // ── タブ ──
  function switchTab(name) {
    document.querySelectorAll('.tab').forEach((t, i) => {
      const names = ['generate','history','favorites'];
      t.classList.toggle('active', names[i] === name);
    });
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    if (name === 'history') renderHistory();
    if (name === 'favorites') renderFavorites();
  }

  // ── API Key ──
  function toggleKey() {
    const inp = document.getElementById('apiKey');
    inp.type = inp.type === 'password' ? 'text' : 'password';
  }

  // ── 生成 ──
  async function generatePosts() {
    const apiKey = document.getElementById('apiKey').value.trim();
    if (!apiKey) { showError('APIキーを入力してください。\nconsole.anthropic.com から取得できます。'); return; }
    const theme = document.getElementById('theme').value.trim();
    if (!theme) { showError('投稿したいテーマ・内容を入力してください。'); return; }

    const target       = document.getElementById('target').value;
    const tone         = document.getElementById('tone').value;
    const hashtagCount = document.getElementById('hashtagCount').value;
    const cta          = document.getElementById('cta').value;
    const useEmoji     = document.getElementById('useEmoji').checked;

    document.getElementById('generateBtn').disabled = true;
    document.getElementById('loading').style.display = 'block';
    document.getElementById('resultSection').style.display = 'none';
    document.getElementById('errorBox').style.display = 'none';

    const prompt = `以下の条件でSNS投稿を生成してください。

【テーマ・内容】${theme}
【ターゲット】${target}
【トーン】${tone}
【絵文字】${useEmoji ? '使用する' : '使用しない'}
【ハッシュタグ数】${hashtagCount}個
【CTA】${cta || 'なし'}

以下のJSON形式で返してください：
{
  "titles": ["タイトル案1", "タイトル案2", "タイトル案3"],
  "patterns": [
    {
      "label": "A",
      "x": "X投稿文（140文字以内、ハッシュタグ含む）",
      "instagram": "Instagram投稿文（改行・ハッシュタグ付き）",
      "facebook": "Facebook投稿文（少し長め・丁寧）",
      "linkedin": "LinkedIn投稿文（ビジネス向け・丁寧）"
    },
    { "label": "B", "x": "...", "instagram": "...", "facebook": "...", "linkedin": "..." },
    { "label": "C", "x": "...", "instagram": "...", "facebook": "...", "linkedin": "..." }
  ],
  "advices": [
    {"icon": "💡", "text": "改善アドバイス1"},
    {"icon": "📈", "text": "改善アドバイス2"},
    {"icon": "🎯", "text": "改善アドバイス3"}
  ]
}
JSONのみ返してください。`;

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-calls': 'true',
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 2000,
          system: 'あなたはSNSマーケティングの専門家です。各プラットフォームの特性を理解した魅力的な投稿文を生成してください。必ずJSONのみ返してください。',
          messages: [{ role: 'user', content: prompt }]
        })
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err?.error?.message || `HTTP ${res.status}`);
      }

      const data = await res.json();
      const text = data?.content?.[0]?.text ?? '';
      const clean = text.replace(/```json|```/g, '').trim();
      const parsed = JSON.parse(clean);

      currentResult = { theme, target, tone, parsed, date: new Date().toISOString() };
      currentFav = false;
      activePattern = 0;

      renderTitles(parsed.titles);
      showPattern(0);
      renderAdvices(parsed.advices);

      document.getElementById('resultSection').style.display = 'block';
      document.getElementById('favBtn').classList.remove('active');
      document.getElementById('favBtn').textContent = '⭐ お気に入り';
      document.getElementById('resultSection').scrollIntoView({ behavior: 'smooth' });

    } catch(e) {
      showError('エラーが発生しました。\n' + (e.message || String(e)));
    } finally {
      document.getElementById('generateBtn').disabled = false;
      document.getElementById('loading').style.display = 'none';
    }
  }

  function showPattern(idx) {
    activePattern = idx;
    document.querySelectorAll('.pattern-tab').forEach((t, i) => t.classList.toggle('active', i === idx));
    if (!currentResult) return;
    const p = currentResult.parsed.patterns[idx];
    const platforms = [
      { key: 'x', name: 'X（Twitter）', icon: '🐦', limit: 140 },
      { key: 'instagram', name: 'Instagram', icon: '📸', limit: null },
      { key: 'facebook', name: 'Facebook', icon: '📘', limit: null },
      { key: 'linkedin', name: 'LinkedIn', icon: '💼', limit: null },
    ];
    document.getElementById('patternContent').innerHTML = platforms.map(pl => {
      const text = p[pl.key] || '';
      const len = text.length;
      const over = pl.limit && len > pl.limit;
      return `<div class="platform-card">
        <div class="platform-header">
          <div class="platform-name">${pl.icon} ${pl.name}</div>
          <div class="platform-actions">
            ${pl.limit ? `<span class="char-count${over?' over':''}">${len}/${pl.limit}文字</span>` : `<span class="char-count">${len}文字</span>`}
            <button class="btn-copy" onclick="copyText(this, \`${esc(text)}\`)">📋 コピー</button>
          </div>
        </div>
        <div class="post-text">${esc(text)}</div>
      </div>`;
    }).join('');
  }

  function renderTitles(titles) {
    document.getElementById('titleList').innerHTML = titles.map(t => `
      <div class="title-item">
        <span>${esc(t)}</span>
        <button class="btn-copy" onclick="copyText(this, \`${esc(t)}\`)">📋 コピー</button>
      </div>`).join('');
  }

  function renderAdvices(advices) {
    document.getElementById('adviceList').innerHTML = advices.map(a => `
      <div class="advice-item"><span style="font-size:1.1rem">${a.icon}</span><span>${esc(a.text)}</span></div>`).join('');
  }

  // ── コピー ──
  function copyText(btn, text) {
    navigator.clipboard.writeText(text).then(() => {
      btn.textContent = '✓ コピー済み';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = '📋 コピー'; btn.classList.remove('copied'); }, 2000);
    });
  }

  // ── お気に入り ──
  function toggleFav() {
    currentFav = !currentFav;
    const btn = document.getElementById('favBtn');
    btn.classList.toggle('active', currentFav);
    btn.textContent = currentFav ? '⭐ お気に入り済み' : '⭐ お気に入り';
  }

  // ── 履歴保存 ──
  function saveToHistory() {
    if (!currentResult) return;
    const entry = {
      id: Date.now(),
      theme: currentResult.theme,
      target: currentResult.target,
      tone: currentResult.tone,
      date: currentResult.date,
      parsed: currentResult.parsed,
      fav: currentFav,
    };
    history.unshift(entry);
    if (history.length > 50) history = history.slice(0, 50);
    saveHistory();
    alert('履歴に保存しました！');
  }

  // ── 履歴表示 ──
  function renderHistory() {
    const filtered = historyFilter === 'fav' ? history.filter(h => h.fav) : history;
    const el = document.getElementById('historyList');
    if (filtered.length === 0) { el.innerHTML = '<div class="empty">履歴がありません</div>'; return; }
    el.innerHTML = filtered.map(h => historyCard(h)).join('');
  }

  function renderFavorites() {
    const favs = history.filter(h => h.fav);
    const el = document.getElementById('favList');
    if (favs.length === 0) { el.innerHTML = '<div class="empty">お気に入りがありません</div>'; return; }
    el.innerHTML = favs.map(h => historyCard(h)).join('');
  }

  function historyCard(h) {
    const d = new Date(h.date).toLocaleString('ja-JP');
    const preview = h.parsed?.patterns?.[0]?.x || '';
    return `<div class="history-item${h.fav?' is-fav':''}">
      <div class="history-header">
        <div>
          <div class="history-theme">${h.fav ? '<span class="fav-star">⭐</span> ' : ''}${esc(h.theme)}</div>
          <div class="history-meta">${d} · ${esc(h.target)} · ${esc(h.tone)}</div>
        </div>
        <div class="history-actions">
          <button class="btn-sm btn-edit" onclick="loadHistory(${h.id})">再編集</button>
          <button class="btn-sm btn-del" onclick="deleteHistory(${h.id})">削除</button>
        </div>
      </div>
      <div class="history-preview">${esc(preview)}</div>
    </div>`;
  }

  function setFilter(f) {
    historyFilter = f;
    document.querySelectorAll('.filter-tab').forEach((t, i) => t.classList.toggle('active', i === (f==='all'?0:1)));
    renderHistory();
  }

  function deleteHistory(id) {
    if (!confirm('この履歴を削除しますか？')) return;
    history = history.filter(h => h.id !== id);
    saveHistory(); renderHistory(); renderFavorites();
  }

  function clearAllHistory() {
    if (!confirm('全ての履歴を削除しますか？')) return;
    history = []; saveHistory(); renderHistory(); renderFavorites();
  }

  function loadHistory(id) {
    const h = history.find(x => x.id === id);
    if (!h) return;
    document.getElementById('theme').value = h.theme;
    document.getElementById('target').value = h.target;
    document.getElementById('tone').value = h.tone;
    currentResult = { theme: h.theme, target: h.target, tone: h.tone, parsed: h.parsed, date: h.date };
    currentFav = h.fav;
    activePattern = 0;
    renderTitles(h.parsed.titles);
    showPattern(0);
    renderAdvices(h.parsed.advices);
    document.getElementById('resultSection').style.display = 'block';
    document.getElementById('favBtn').classList.toggle('active', h.fav);
    document.getElementById('favBtn').textContent = h.fav ? '⭐ お気に入り済み' : '⭐ お気に入り';
    switchTab('generate');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  // ── エラー ──
  function showError(msg) {
    const el = document.getElementById('errorBox');
    el.textContent = '⚠ ' + msg;
    el.style.display = 'block';
  }

  function esc(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/`/g,'&#96;');
  }
</script>
</body>
</html>
